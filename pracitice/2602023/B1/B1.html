<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B1</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    input {outline: none;border: 2px solid;}
  </style>
</head>
<body class="center">
  <input type="text">
</body>
<script src="../lib/lib.js"></script>
<script>
  const input = $("input");
  const getPsw = pw => {
    const l = pw.length;
    const u = /[A-Z]/.test(pw)
    const n = /[0-9]/.test(pw)
    const s = /[!@#$%^&*]/.test(pw)

    input.style.borderColor = 
    !l ? "black" : (l >= 8 && u && n && s) ? "green" : (l >= 6 && (u || n)) ? "yellow" : "red"
  }
  input.addEventListener("input", (e) => {
    getPsw(input.value)
  })
</script>
</html>
