<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A12</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .circle {width: 30px;height: 30px;border-radius: 50%;position: absolute;}
    .circle1{background-color: red; animation: l1 2s infinite;}
    .circle2{background-color: rgb(255, 230, 0); animation: l2 2s infinite;}
    .circle3{background-color: rgb(30, 255, 0); animation: l3 2s infinite;}
    .circle4{background-color: rgb(0, 162, 255); animation: l4 2s infinite;}

    /* transform: translate(0, 0) -> 로딩 1 :: (0, 0)부터 시작 */ 
    /* transform: translate(-50px, 0) -> 로딩 2 :: (-50px, 0)부터 시작 */
    /* transform: translate(-50px, 50px) -> -> 로딩 3 :: (-50px, 50px)부터 시작 */
    /* transform: translate(0, 50px) -> 로딩 4 :: (0, 50px)부터 시작 */

    /* 그 후 쭉 반복... */

    @keyframes l1 {
      0% {transform: translate(0, 0);}
      25% {transform: translate(-50px, 0);}
      50% {transform: translate(-50px, 50px);}
      75% {transform: translate(0px, 50px);}
      100% {transform: translate(0px, 0);}
    }
    @keyframes l2 {
      0% {transform: translate(-50px, 0);}
      25% {transform: translate(-50px, 50px);}
      50% {transform: translate(0px, 50px);}
      75% {transform: translate(0px, 0px);}
      100% {transform: translate(-50px, 0px);}
    }
    @keyframes l3 {
      0% {transform: translate(-50px, 50px);}
      25% {transform: translate(0px, 50px);}
      50% {transform: translate(0px, 0px);}
      75% {transform: translate(-50px, 0);}
      100% {transform: translate(-50px, 50px);}
    }
    @keyframes l4 {
      0% {transform: translate(0px, 50px);}
      25% {transform: translate(0px, 0px);}
      50% {transform: translate(-50px, 0);}
      75% {transform: translate(-50px, 50px);}
      100% {transform: translate(0px, 50px);}
    }
  </style>
</head>
<body class="center">
  <div class="circle circle1"></div>
  <div class="circle circle2"></div>
  <div class="circle circle3"></div>
  <div class="circle circle4"></div>
</body>
</html>
