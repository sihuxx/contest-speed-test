<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A13</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .notice{width: 1000px;height: 500px;display: none;flex-direction: column;align-items: center;justify-content: center; gap: 10px;padding: 20px;border: 1px solid;background-color: white;z-index: 100;position: fixed;top: 50%;left: 50%;transform: translate(-50%, -50%);}
    #open:checked ~ .notice {display: flex;}
    #close:checked ~ .notice {display: none;}
  </style>
</head>

<body class="center">
  <input type="radio" name="check" id="open" hidden>
  <input type="radio" name="check" id="close" hidden>
  <label for="open">로그인</label>
  <div class="notice">
    계정 로그인
    안전한 서비스를 위해 로그인이 필요합니다.
<br>
계속하려면 아래에 등록된 이메일과 비밀번호를 입력해주세요.
<br>
    로그인 계속
    <label for="close">닫기</label>
  </div>
</body>

</html>
