<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A13</title>
  <link rel="stylesheet" href="../lib/lib.css">
  <style>
    .notices {background-color: white; position: absolute;display: none;flex-direction: column;align-items: center;padding: 20px;gap: 15px;border: 1px solid;}
    body:has(#close:checked) > .notices {display: none;}
    #login:checked ~ .notices {display: flex;}
    label {padding: 5px;border: 1px solid;cursor: pointer;}
  </style>
</head>
<body class="center">
  <input type="radio" hidden name="check" id="login">
  <label for="login">로그인</label>
  <div class="notices">
    <p>계정 로그인</p>
    <p>안전한 서비스를 위해 로그인이 필요합니다.</p>
    <p>계속하려면 아래에 등록된 이메일과 비밀번호를 입력해주세요.</p>
    <p>로그인 계속</p>
    <input type="radio" hidden name="check" id="close">
    <label for="close">닫기</label>
  </div>
</body>
</html>
