<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div>
    <input type="color" id="input">
    <button id="btn">변경</button>
  </div>
</body>
<script>
  btn.onclick =() => {
    document.body.style.backgroundColor = input.value
  }
</script>
</html>
