<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f0f0;font-family:sans-serif}
  .wrap{display:flex;gap:20px;padding:40px}

  .card{width:160px;height:220px;perspective:1000px;cursor:pointer}

  .inner{
    width:100%;height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:transform .7s cubic-bezier(.4,0,.2,1);
  }

  /* 마우스 오버 시 X축 회전 */
  .card:hover .inner{transform:rotateX(180deg)}

  .front, .back{
    position:absolute;inset:0;
    border-radius:18px;
    display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden; /* 뒤집혔을 때 안보이게 설정 */
    -webkit-backface-visibility:hidden;
    color:#fff;
  }

  .front{
    z-index: 2;
    transform: translateZ(1px);
  }

  /* 뒷면: 뒤집힌 상태에서 글자가 정방향으로 보이게 rotateX(180deg) 유지 */
  .back{
    transform: rotateX(180deg) translateZ(1px);
    font-size:1.5rem; font-weight:800;
  }

  /* 카드별 색상 */
  .c1 .front, .c1 .back { background: linear-gradient(160deg, #f97040, #e91e8c); }
  .c2 .front, .c2 .back { background: linear-gradient(160deg, #43c6ac, #191654); }
  .c3 .front, .c3 .back { background: linear-gradient(160deg, #f7971e, #ffd200); }
  .c4 .front, .c4 .back { background: linear-gradient(160deg, #7f00ff, #e100ff); }
  .c5 .front, .c5 .back { background: linear-gradient(160deg, #11998e, #38ef7d); }
  .c6 .front, .c6 .back { background: linear-gradient(160deg, #2980b9, #6dd5fa); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card c1"><div class="inner"><div class="front">Card 1</div><div class="back">1</div></div></div>
  <div class="card c2"><div class="inner"><div class="front">Card 2</div><div class="back">2</div></div></div>
  <div class="card c3"><div class="inner"><div class="front">Card 3</div><div class="back">3</div></div></div>
  <div class="card c4"><div class="inner"><div class="front">Card 4</div><div class="back">4</div></div></div>
  <div class="card c5"><div class="inner"><div class="front">Card 5</div><div class="back">5</div></div></div>
  <div class="card c6"><div class="inner"><div class="front">Card 6</div><div class="back">6</div></div></div>
</div>
</body>
</html>
